<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 Labs</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --blue: #1d6cf0;
      --blue-light: #4d8ff5;
      --blue-dim: #0f3d8a;
      --ink: #0a0f1e;
      --paper: #f5f7ff;
      --white: #ffffff;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--ink);
      color: var(--white);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── Nav ── */
    nav {
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .logo {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--white);
      text-decoration: none;
    }

    .logo span {
      color: var(--blue);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 2.5rem;
    }

    nav ul a {
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    nav ul a:hover {
      color: var(--white);
    }

    /* ── Hero ── */
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 3rem;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .eyebrow {
      display: inline-block;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--blue);
      margin-bottom: 2rem;
    }

    h1 {
      font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 800;
      line-height: 0.92;
      letter-spacing: -0.04em;
      margin-bottom: 2.5rem;
    }

    h1 em {
      font-style: normal;
      color: var(--blue);
    }

    .tagline {
      font-size: clamp(1rem, 2.2vw, 1.35rem);
      color: rgba(255,255,255,0.55);
      line-height: 1.6;
      max-width: 520px;
      margin-bottom: 3rem;
    }

    .cta-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn-primary {
      background: var(--blue);
      color: var(--white);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.85rem 2rem;
      border-radius: 6px;
      transition: background 0.2s, transform 0.1s;
      letter-spacing: 0.01em;
    }

    .btn-primary:hover {
      background: var(--blue-light);
      transform: translateY(-1px);
    }

    .btn-ghost {
      color: rgba(255,255,255,0.6);
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      padding: 0.85rem 1.5rem;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-ghost:hover {
      border-color: rgba(255,255,255,0.35);
      color: var(--white);
    }

    /* ── Divider rule ── */
    .rule {
      border: none;
      border-top: 1px solid rgba(255,255,255,0.07);
      margin: 0 3rem;
    }

    /* ── Footer ── */
    footer {
      padding: 2rem 3rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .love {
      font-size: 0.85rem;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.01em;
    }

    .love span {
      color: var(--blue);
    }

    .footer-links {
      display: flex;
      gap: 1.5rem;
    }

    .footer-links a {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.25);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer-links a:hover {
      color: rgba(255,255,255,0.6);
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      nav {
        padding: 1.5rem;
      }

      nav ul {
        display: none;
      }

      .hero {
        padding: 0 1.5rem;
      }

      .rule, footer {
        padding-left: 1.5rem;
        padding-right: 1.5rem;
      }
    }
  </style>
</head>
<body>

  <nav>
    <a class="logo" href="#">500<span>Labs</span></a>
  </nav>

  <main class="hero">
    <span class="eyebrow">Independent software studio</span>
    <h1>We build<br />things that<br /><em>matter.</em></h1>
    <p class="tagline">
      500 Labs crafts focused software products — the kind that solve real problems
      and feel genuinely good to use.
    </p>
  </main>

  <hr class="rule" />

  <footer>
    <p class="love">Building with <span>❤️</span> from Toronto.</p>
  </footer>

</body>
</html>
